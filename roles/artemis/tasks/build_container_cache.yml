---
# Configures the host-side state for the per-agent Maven/Gradle build-container cache
# (see https://docs.artemis.tum.de/admin/production-setup/programming-exercise-adjustments#caching-bind-mounts).
# This task file is intentionally separate from artemis_setup.yml / artemis_config.yml / docker_deploy_artemis.yml
# because the cache needs to be provisioned for both deployment modes (host-JVM and Docker), and on both a fresh
# `setup_system` run and a routine `update_artemis_config` refresh. main.yml includes us once if any of those
# gates are active.
#
# Behavior summary:
#   - Validate that any configured cache path is non-empty, absolute, and not a top-level system directory.
#   - Create the host directory `root:root 0755` so the container's root user can write but no other host user can.
#     World-writable (0777) is intentionally avoided; the security trade-off is discussed in the Artemis docs.
#     On rootless Docker / `--userns-remap`, the in-container root maps to an unprivileged host UID — in that case
#     the operator must either set `read_only: true` (and warm the cache externally) or chown the host directory.
#   - Remove any legacy host-cron prune jobs that earlier versions of this role installed. The build agent JVM now
#     owns cleanup via BuildContainerCacheCleanupService (pause → prune → resume), which avoids the race between a
#     host-side `find -delete` and an active build reading the same file. Removal is unconditional so re-running
#     this role on an upgraded agent cleans up its previous state.

# --- Path validation -----------------------------------------------------------------------------------------------
# Catch dangerous values (empty, "/", well-known system roots) before we create the cache directory. We no longer
# install a host `find ... -delete` cron, but the validation is still cheap insurance against a typo or a vault-
# rendered empty string accidentally pointing the bind mount at a system root.

- name: Validate Maven build-container cache path is safe
  ansible.builtin.assert:
    that:
      - continuous_integration.localci.build_container_cache.maven is string
      - continuous_integration.localci.build_container_cache.maven | length > 1
      - continuous_integration.localci.build_container_cache.maven.startswith('/')
      - continuous_integration.localci.build_container_cache.maven not in ['/', '/var', '/etc', '/usr', '/bin',
          '/sbin', '/lib', '/lib64', '/boot', '/dev', '/proc', '/sys', '/root', '/home', '/opt', '/tmp', '/srv',
          '/run', '/media', '/mnt']
    fail_msg: >-
      continuous_integration.localci.build_container_cache.maven must be a non-empty absolute path and cannot be
      a top-level system directory (got: '{{ continuous_integration.localci.build_container_cache.maven }}').
  when:
    - continuous_integration.localci is defined
    - continuous_integration.localci.is_build_agent is defined
    - continuous_integration.localci.is_build_agent | bool
    - continuous_integration.localci.build_container_cache is defined
    - continuous_integration.localci.build_container_cache.maven is defined

- name: Validate Gradle build-container cache path is safe
  ansible.builtin.assert:
    that:
      - continuous_integration.localci.build_container_cache.gradle is string
      - continuous_integration.localci.build_container_cache.gradle | length > 1
      - continuous_integration.localci.build_container_cache.gradle.startswith('/')
      - continuous_integration.localci.build_container_cache.gradle not in ['/', '/var', '/etc', '/usr', '/bin',
          '/sbin', '/lib', '/lib64', '/boot', '/dev', '/proc', '/sys', '/root', '/home', '/opt', '/tmp', '/srv',
          '/run', '/media', '/mnt']
    fail_msg: >-
      continuous_integration.localci.build_container_cache.gradle must be a non-empty absolute path and cannot be
      a top-level system directory (got: '{{ continuous_integration.localci.build_container_cache.gradle }}').
  when:
    - continuous_integration.localci is defined
    - continuous_integration.localci.is_build_agent is defined
    - continuous_integration.localci.is_build_agent | bool
    - continuous_integration.localci.build_container_cache is defined
    - continuous_integration.localci.build_container_cache.gradle is defined

# --- Host directory provisioning -----------------------------------------------------------------------------------

- name: Create Maven build-container cache directory
  become: true
  ansible.builtin.file:
    path: "{{ continuous_integration.localci.build_container_cache.maven }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - continuous_integration.localci is defined
    - continuous_integration.localci.is_build_agent is defined
    - continuous_integration.localci.is_build_agent | bool
    - continuous_integration.localci.build_container_cache is defined
    - continuous_integration.localci.build_container_cache.maven is defined

- name: Create Gradle build-container cache directory
  become: true
  ansible.builtin.file:
    path: "{{ continuous_integration.localci.build_container_cache.gradle }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - continuous_integration.localci is defined
    - continuous_integration.localci.is_build_agent is defined
    - continuous_integration.localci.is_build_agent | bool
    - continuous_integration.localci.build_container_cache is defined
    - continuous_integration.localci.build_container_cache.gradle is defined

# --- Legacy host-cron removal --------------------------------------------------------------------------------------
# Older versions of this role installed a root crontab that pruned the cache once a week (Sun 04:00/04:15) via
# `find -atime +30 -type f -delete`. That mechanism is superseded by the JVM-driven cleanup in
# BuildContainerCacheCleanupService, which pauses the agent before pruning so it cannot race with a running build.
# Re-running this role on an upgraded agent must remove the legacy entries. The removal is unconditional (no
# `when:` gate on whether the cache key is set) so it cleans up agents whose inventory still mentions the path.

- name: Remove legacy host-cron Maven build-container cache prune (superseded by JVM-driven cleanup)
  become: true
  ansible.builtin.cron:
    name: artemis-buildagent-maven-cache-prune
    state: absent
  when:
    - continuous_integration.localci is defined
    - continuous_integration.localci.is_build_agent is defined
    - continuous_integration.localci.is_build_agent | bool

- name: Remove legacy host-cron Gradle build-container cache prune (superseded by JVM-driven cleanup)
  become: true
  ansible.builtin.cron:
    name: artemis-buildagent-gradle-cache-prune
    state: absent
  when:
    - continuous_integration.localci is defined
    - continuous_integration.localci.is_build_agent is defined
    - continuous_integration.localci.is_build_agent | bool
