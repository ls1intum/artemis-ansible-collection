---
# Catch unquoted 2-segment YAML floats (e.g. `artemis_version: 9.2` → float, `9.10` → 9.1)
# before they reach the WAR URL, the Docker tag, or the helper script's tag argument.
- name: Assert artemis_version is a string when set
  ansible.builtin.assert:
    that:
      - artemis_version is string
    fail_msg: >-
      artemis_version is not a string (got type {{ artemis_version | type_debug }},
      value {{ artemis_version }}). In YAML inventory/group_vars (or JSON/YAML
      extra-vars), 2-segment release tags like 9.2 must be quoted ("9.2") —
      otherwise they parse as floats and "9.10" silently becomes "9.1".
  when:
    - artemis_version is defined
    - artemis_version is not none
    - artemis_version != ""

- name: Assert artemis_build_version is a string when overridden
  ansible.builtin.assert:
    that:
      - artemis_build_version is string
    fail_msg: >-
      artemis_build_version is not a string (got type
      {{ artemis_build_version | type_debug }}, value {{ artemis_build_version }}).
      Same YAML-float footgun as artemis_version: in group_vars/host_vars or
      inline JSON/YAML-form extra-vars, 2-segment Docker tags must be quoted
      (e.g. "9.2").
  when:
    - artemis_build_version is defined
    - artemis_build_version is not none
    - artemis_build_version != ""

# Check if variables are set correctly
- include_tasks: variable_checks.yml
  when: (setup_system | bool) or (update_artemis_config | bool)

- include_tasks: node_checks.yml
  when:
    - continuous_integration.localci is defined
    - is_build_agent is defined and (is_build_agent | bool)
    - (setup_system | bool) or (update_artemis_config | bool)

# Create Artemis and (if desired) deployment users.
- include_tasks: users.yml
  when:
    - setup_system | bool

# Install JDK
- include_tasks: jdk.yml
  when:
    - not (use_docker | bool)
    - setup_system | bool

# Install other dependencies and setup host
- include_tasks: artemis_setup.yml
  when:
    - not (use_docker | bool)
    - setup_system | bool

# Configure Artemis application
- include_tasks: artemis_config.yml
  when:
    - not (use_docker | bool)
    - update_artemis_config | bool

# Install Artemis to the host using Docker
- include_tasks: docker_deploy_artemis.yml
  when:
    - (use_docker | bool)

# Provision the build-container dependency cache (host directories + weekly prune cron) on build
# agents that opt in via continuous_integration.localci.build_container_cache. Runs in any of:
#   - fresh host setup (setup_system) so a brand-new agent gets the directories before Artemis starts
#   - routine config refresh (update_artemis_config) so an operator who newly enables the cache
#     without re-running the full setup play still ends up with the host directories present before
#     the restarted JVM bind-mounts them
#   - Docker-based deploys (use_docker) — same reasoning; Docker bind mounts cannot create a missing
#     host source path with the correct ownership/mode
# The cron tasks inside flip state:present <-> state:absent based on whether the inventory key is
# currently set, so removing the key cleans up the leftover crontab entry.
- include_tasks: build_container_cache.yml
  when:
    - continuous_integration.localci is defined
    - continuous_integration.localci.is_build_agent is defined
    - continuous_integration.localci.is_build_agent | bool
    - (setup_system | bool) or (update_artemis_config | bool) or (use_docker | bool)

# Restart Artemis
- include_tasks: restart_artemis.yml
  when:
    - not (use_docker | bool)
    - restart_artemis | bool
