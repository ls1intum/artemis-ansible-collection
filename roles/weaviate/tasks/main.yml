---
# Validate required variables
- name: Validate required variables are set
  assert:
    that:
      - weaviate_domain is defined and weaviate_domain != ""
      - weaviate_api_key is defined and weaviate_api_key != ""
      - letsencrypt_email is defined and letsencrypt_email != ""
    fail_msg: |
      Required variables are missing!
      Please ensure the following are set:
        - weaviate_domain (e.g., weaviate.example.com)
        - weaviate_api_key (generate with: openssl rand -base64 32)
        - letsencrypt_email (e.g., your-email@example.com)

- name: Ensure weaviate group {{ weaviate_user_group }} exists
  become: true
  group:
    name: "{{ weaviate_user_group }}"
    gid: "{{ weaviate_user_gid }}"
    state: present

- name: Ensure weaviate user {{ weaviate_user_name }} exists
  become: true
  user:
    name: "{{ weaviate_user_name }}"
    state: present
    uid: "{{ weaviate_user_uid }}"
    group: "{{ weaviate_user_group }}"
    groups: "docker"

- name: Create weaviate directories
  become: true
  file:
    path: "{{ item }}"
    state: directory
    mode: "775"
  loop:
    - "{{ weaviate_working_directory }}"
    - "{{ weaviate_traefik_directory }}"
    - "{{ weaviate_backup_directory }}"
    - "{{ weaviate_data_directory }}"

- name: Set permissions for weaviate directories
  become: true
  file:
    path: "{{ item }}"
    state: directory
    recurse: true
    owner: "{{ weaviate_user_name }}"
    group: "{{ weaviate_user_group }}"
  loop:
    - "{{ weaviate_working_directory }}"
    - "{{ weaviate_traefik_directory }}"
    - "{{ weaviate_backup_directory }}"
    - "{{ weaviate_data_directory }}"
  notify: restart docker weaviate

- name: Copy configuration templates that trigger restart
  become: true
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ weaviate_user_name }}"
    group: "{{ weaviate_user_group }}"
    mode: "660"
  loop:
    - src: docker-compose.yml.j2
      dest: "{{ weaviate_working_directory }}/docker-compose.yml"
    - src: docker.env.j2
      dest: "{{ weaviate_working_directory }}/.env"
    - src: traefik.yml.j2
      dest: "{{ weaviate_traefik_directory }}/traefik.yml"
  notify: restart docker weaviate

- name: Generate Traefik config.yml from template
  become: true
  template:
    src: "config.yml.j2"
    dest: "{{ weaviate_traefik_directory }}/config.yml"
    owner: "{{ weaviate_user_name }}"
    group: "{{ weaviate_user_group }}"
    mode: "660"
  notify: restart docker weaviate

- name: Create acme.json for Let's Encrypt certificates
  become: true
  file:
    path: "{{ weaviate_traefik_directory }}/acme.json"
    state: touch
    owner: "{{ weaviate_user_name }}"
    group: "{{ weaviate_user_group }}"
    mode: "600"
    modification_time: preserve
    access_time: preserve

- name: Copy templated shell scripts
  become: true
  template:
    src: "{{ item }}.j2"
    dest: "{{ weaviate_working_directory }}/{{ item }}"
    owner: "{{ weaviate_user_name }}"
    group: "{{ weaviate_user_group }}"
    mode: "770"
  loop:
    - restore.sh
    - weaviate-docker.sh

# --- Backups -----------------------------------------------------------------
# The Weaviate container runs as root and writes backup files into the
# bind-mounted backup directory as root:root. A non-root user can read them but
# cannot delete them, so both backup creation and retention run as root from a
# single root-owned script. See templates/weaviate-backup.j2.

- name: Ensure backup job dependencies are installed
  become: true
  package:
    name:
      - curl
      - jq
      - util-linux
    state: present

- name: Ensure /etc/weaviate exists
  become: true
  file:
    path: "/etc/weaviate"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Deploy backup secrets env file
  become: true
  template:
    src: backup.env.j2
    dest: "{{ weaviate_backup_env_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Deploy root-owned Weaviate backup script
  become: true
  template:
    src: weaviate-backup.j2
    dest: "{{ weaviate_backup_script_path }}"
    owner: root
    group: root
    mode: "0700"

# Remove the obsolete weaviate-user backup script from upgraded hosts. It ran
# as the weaviate user, compressed to tar.gz, and could not delete the
# root-owned backup directories — superseded by the root-owned script above.
- name: Remove obsolete weaviate-user backup script
  become: true
  file:
    path: "{{ weaviate_working_directory }}/backup.sh"
    state: absent

# Remove the legacy weaviate-user cron jobs. The old creation script could not
# delete the root-owned backup directories (leaking one per night) and the old
# cleanup job only matched *.tar.gz, so neither is correct any more.
- name: Remove legacy weaviate-user backup cron jobs
  become: true
  cron:
    name: "{{ item }}"
    user: "{{ weaviate_user_name }}"
    state: absent
  loop:
    - "Weaviate automated backup"
    - "Weaviate backup cleanup"

# One-time (idempotent) prune of any backup artifacts that leaked under the old
# weaviate-user script. Runs cleanup-only (no new backup) before the new cron is
# installed, and is protected by the same flock as the cron job, the retention
# window, and the min-count floor.
- name: Prune leaked/old backups once during convergence
  become: true
  command: "{{ weaviate_backup_script_path }} --cleanup-only"
  register: weaviate_backup_cleanup
  changed_when: "'pruning' in weaviate_backup_cleanup.stdout"
  when: weaviate_enable_automated_backups | bool

- name: Setup automated backup cron job (root)
  become: true
  cron:
    name: "Weaviate automated backup"
    minute: "{{ weaviate_backup_schedule.split()[0] }}"
    hour: "{{ weaviate_backup_schedule.split()[1] }}"
    day: "{{ weaviate_backup_schedule.split()[2] }}"
    month: "{{ weaviate_backup_schedule.split()[3] }}"
    weekday: "{{ weaviate_backup_schedule.split()[4] }}"
    job: "{{ weaviate_backup_script_path }} >> {{ weaviate_backup_log_file }} 2>&1"
    user: root
    state: present
  when: weaviate_enable_automated_backups | bool

- name: Remove automated backup cron job when backups are disabled
  become: true
  cron:
    name: "Weaviate automated backup"
    user: root
    state: absent
  when: not (weaviate_enable_automated_backups | bool)

- name: Ensure handlers are flushed before starting
  meta: flush_handlers

- name: Start Weaviate services
  become: true
  command: ./weaviate-docker.sh start
  args:
    chdir: "{{ weaviate_working_directory }}"
  register: weaviate_start_result
  changed_when: "'Starting' in weaviate_start_result.stdout"
